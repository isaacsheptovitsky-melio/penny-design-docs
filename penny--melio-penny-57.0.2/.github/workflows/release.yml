name: Release

on:
  push:
    branches:
      - 'main'

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PACKAGES_RELEASE_TOKEN }}

      - name: Release Setup
        uses: ./.github/actions/release-setup
        with:
          npm-token: ${{ secrets.PACKAGES_RELEASE_TOKEN }}

      - name: Create Release Pull Request or Publish to github registry
        id: changesets
        uses: changesets/action@v1
        with:
          title: "Version Packages"
          publish: pnpm run publish:canary
          commit: "ci(changesets): version packages"
          setupGitUser: false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_RELEASE_TOKEN }}
          GH_TOKEN: ${{ secrets.PACKAGE_RELEASE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PACKAGES_RELEASE_TOKEN }}
