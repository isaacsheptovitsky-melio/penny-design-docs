name: Auto Changeset for Dependency PRs

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

  # Manual trigger for testing on existing PRs
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to add changeset to'
        required: true
        type: number

jobs:
  add-changeset:
    # Only run for Renovate or Dependabot PRs (auto) or manual dispatch
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.head_ref, 'renovate/') ||
      startsWith(github.head_ref, 'dependabot/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Get PR info
        id: pr
        run: |
          PR_NUMBER=${{ github.event.pull_request.number || inputs.pr_number }}
          HEAD_REF=$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json headRefName --jq '.headRefName')
          echo "head_ref=$HEAD_REF" >> $GITHUB_OUTPUT
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create changeset
        id: changeset
        run: |
          npx tsx .github/scripts/create-changeset.ts "${{ steps.pr.outputs.number }}"
          if git status --porcelain | grep -q '.changeset/'; then
            echo "created=true" >> $GITHUB_OUTPUT
          else
            echo "created=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push changeset
        if: steps.changeset.outputs.created == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .changeset/
          git commit -m "chore: add changeset for dependency update"
          git push
