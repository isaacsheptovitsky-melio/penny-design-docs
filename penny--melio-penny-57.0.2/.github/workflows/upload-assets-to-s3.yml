name: Upload Assets to S3

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the assets (e.g., 1.2.3)'
        required: false
        type: string
  push:
    tags:
      - '@melio/penny-assets@*'

jobs:
  upload-assets:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Set bucket name
        id: set_bucket
        run: |
          # Use input bucket if provided (workflow_dispatch), otherwise use default
          BUCKET="${{ github.event.inputs.bucket || 'penny-static' }}"
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
          echo "Using S3 bucket: $BUCKET"

      - name: Determine version
        id: determine_version
        run: |
          # Use manual version input if provided (workflow_dispatch), otherwise extract from tag
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "Using manual version: $VERSION"
          else
            # Extract tag name from refs/tags/tagname
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Full tag: $TAG_NAME"
          
          # Extract version from different tag patterns
          if [[ "$TAG_NAME" == penny-assets-v* ]]; then
            VERSION=${TAG_NAME#penny-assets-v}
          elif [[ "$TAG_NAME" == @melio/penny-assets@* ]]; then
            VERSION=${TAG_NAME#@melio/penny-assets@}
          elif [[ "$TAG_NAME" == penny-assets@* ]]; then
            VERSION=${TAG_NAME#penny-assets@}
          else
            VERSION=$TAG_NAME
          fi
          
            echo "Extracted version from tag: $VERSION"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Final version: $VERSION"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          audience: sts.amazonaws.com
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::563186419109:role/penny-github-action-role

      - name: Upload assets to S3
        run: |
          pnpm upload-assets --version "${{ steps.determine_version.outputs.version }}" --bucket "${{ steps.set_bucket.outputs.bucket }}" --asset-dir "src/assets"

      - name: Sync versioned assets to latest folder
        run: |
          pnpm sync-latest-assets --version "${{ steps.determine_version.outputs.version }}" --bucket "${{ steps.set_bucket.outputs.bucket }}"

      - name: Summary
        run: |
          VERSION="${{ steps.determine_version.outputs.version }}"
          BUCKET="${{ steps.set_bucket.outputs.bucket }}"
          echo "🚀 **Assets uploaded and synced successfully!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The assets for version \`${VERSION}\` have been uploaded to S3 bucket \`${BUCKET}\` and are available at:" >> $GITHUB_STEP_SUMMARY
          echo "- **Icons**: \`s3://${BUCKET}/assets/${VERSION}/icons/\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Illustrations**: \`s3://${BUCKET}/assets/${VERSION}/illustrations/\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Brands**: \`s3://${BUCKET}/assets/${VERSION}/brands/\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Flags**: \`s3://${BUCKET}/assets/${VERSION}/flags/\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Brand Symbols**: \`s3://${BUCKET}/assets/${VERSION}/brand-symbols/\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The assets have also been synced to the latest directory:" >> $GITHUB_STEP_SUMMARY
          echo "- **All Assets**: \`s3://${BUCKET}/assets/latest/\`" >> $GITHUB_STEP_SUMMARY          